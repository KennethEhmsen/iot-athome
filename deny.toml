# cargo-deny configuration — supply-chain gating.
# Plan §5 / ADR-0006. Run via `cargo deny check` (wired into CI).

[graph]
all-features = false
no-default-features = false

[licenses]
# Allow-list: anything a commercial shop can ship without legal review.
allow = [
    "MIT",
    "MIT-0",                  # MIT No Attribution — permissive, OSI-approved
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",    # Linux Foundation — permissive, used by SBOM crates
    "0BSD",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path deps (our workspace-internal crates) always appear as wildcards in
# Cargo's dependency graph; allow-wildcard-paths keeps them off the error list.
allow-wildcard-paths = true
highlight = "all"
# Deny crates that are known-unmaintained or duplicative of a workspace pick.
# crate-spec format: "name" or "name:version-req".
deny = [
    # OpenSSL directly — rustls is our TLS stack (ADR-0002).
    "openssl-sys",
    # time 0.1 — known unsoundness (RUSTSEC-2020-0071).
    "time:<0.3",
]

[advisories]
version = 2
# "deny" blocks build; "warn" surfaces but does not gate. Start strict.
#
# Allow-listed advisories come with a justification + revisit expectation.
# Keep the list short — anything here should be revisited quarterly.
ignore = [
  # tokio-tar PAX header smuggling. Transitive via testcontainers only;
  # dev-time dependency not shipped in production binaries.
  # Revisit: when testcontainers bumps past the vulnerable dep.
  "RUSTSEC-2025-0111",
  # fxhash — unmaintained, transitive via sqlx / testcontainers.
  # No security implication; dropping when dependents move to rustc-hash.
  "RUSTSEC-2025-0057",
  # rustls-pemfile — unmaintained crate, still-secure code.
  # Transitive via reqwest; will drop naturally on next reqwest bump.
  "RUSTSEC-2025-0134",
  # rustls-webpki 0.102.8 CVEs — transitive via rumqttc 0.24 → rustls 0.22.
  # rumqttc upstream has not yet bumped; the adapter uses MQTT over the
  # local Docker network only, so CRL/name-constraint edge cases aren't
  # reachable. Tried rumqttc 0.25 — it still hard-pins webpki 0.102.8 for
  # CRL parsing, so the upgrade didn't help. Revisit: on next rumqttc
  # release that actually bumps webpki to 0.103.x.
  "RUSTSEC-2026-0049",
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  # RUSTSEC-2026-0104 — reachable panic in BorrowedCertRevocationList::from_der.
  # Same root cause; CRL parsing isn't on the rumqttc → broker code path.
  "RUSTSEC-2026-0104",
  # paste 1.0.15 unmaintained — author archived the repo. Transitive via
  # cel-interpreter 0.10 → antlr4rust 0.3.0-rc2 → better_any → paste, used
  # for proc-macro identifier joining at compile time only (no runtime
  # surface). A drop-in fork (`pastey`) exists but the upstream cel-rust /
  # antlr4rust chain hasn't migrated. Revisit: on next cel-interpreter
  # bump or when antlr4rust ships a non-rc release.
  "RUSTSEC-2024-0436",
]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

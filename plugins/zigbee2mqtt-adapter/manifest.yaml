# IoT-AtHome zigbee2mqtt adapter (WASM port of the M1 native adapter).
#
# Consumes every zigbee2mqtt/<friendly_name> MQTT message, translates,
# and publishes one EntityState per recognized entity on
# `device.zigbee2mqtt.<friendly_name>.<entity>.state`. The iot-registry
# bus-watcher (M3 W1.2) auto-registers the
# `(zigbee2mqtt, friendly_name)` pair on first sight — no explicit
# registry upsert needed (the host capability went away in ABI 1.3.0
# / M5a W1).
#
# Per-plugin NATS user JWT minted by `iotctl plugin install` against
# the operator-signed account — ADR-0011 retired in M5a W1.

schema_version: 1
id: zigbee2mqtt-adapter
name: Zigbee2MQTT Adapter
version: 0.3.0
description: >
  Bridges zigbee2mqtt MQTT traffic into canonical EntityState bus events.
  Requires zigbee2mqtt running as a separate Node process publishing on
  `zigbee2mqtt/<friendly_name>` — this adapter subscribes, translates,
  and forwards.
authors: ["IoT-AtHome"]
license: "Apache-2.0 OR MIT"

runtime: wasm-component
abi:
  world: iot:plugin-host
  version: 1.3.0
entrypoint: plugin.wasm

capabilities:
  mqtt:
    subscribe:
      - "zigbee2mqtt/+"
  bus:
    publish:
      - "device.zigbee2mqtt.>"

resources:
  memory_mb_max: 64
  cpu_pct_max: 10
  fuel_max: 10000000

signatures:
  - mechanism: cosign-keyless
    rekor_entry: "DEV-UNSIGNED"
    identity: "dev@localhost"
    issuer: "dev"

sbom: sbom.cdx.json

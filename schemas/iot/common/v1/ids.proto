syntax = "proto3";

package iot.common.v1;

// Stable ULID (26-char Crockford base32, lexicographic).
// All device, plugin, rule, and user IDs use this format.
message Ulid {
  // 26 ASCII characters. Validated at boundaries.
  string value = 1;
}

// Monotonic nanoseconds since Unix epoch. Preferred over
// google.protobuf.Timestamp when we want millisecond-or-better ordering
// guarantees from the hub clock without TZ complications.
message MonoTimestamp {
  int64 unix_nanos = 1;
}

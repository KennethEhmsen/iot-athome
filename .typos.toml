# crate-ci/typos configuration.
# https://github.com/crate-ci/typos
#
# Schema: extend-identifiers and extend-words are MAPS (identifier -> canonical),
# not arrays. Identical key and value = accept as-is.

[files]
extend-exclude = [
  "docs/build-doc/node_modules/**",
  "target/**",
  "panel/dist/**",
  "panel/dev-dist/**",
  "tools/devcerts/generated/**",
  "**/*.lock",
]

[default.extend-identifiers]
# Domain / product names we can't change.
BACnet    = "BACnet"
AFE       = "AFE"
OTAs      = "OTAs"
OTA       = "OTA"
Mosquitto = "Mosquitto"
mosquitto = "mosquitto"

[default.extend-words]
# Whole-word allow-list for spelling variants we use intentionally.
unparseable = "unparseable"
Unparseable = "Unparseable"
mis         = "mis"
leafs       = "leafs"

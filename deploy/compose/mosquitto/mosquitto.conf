# Mosquitto — dev config.
# Per design §5.5: no anonymous listener, mTLS-first.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Hard rule: no anonymous. Attempting to override this in a child config fails.
allow_anonymous false

# --- 8883: TLS (password-auth for legacy firmware that can't do client certs) ---
listener 8883
protocol mqtt
cafile   /mosquitto/ca/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile  /mosquitto/certs/mosquitto.key
require_certificate false
use_identity_as_username false
# password_file /mosquitto/config/passwd    # TODO: seed dev users

# --- 8884: mTLS (devices identified by client cert CN) ---
listener 8884
protocol mqtt
cafile   /mosquitto/ca/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile  /mosquitto/certs/mosquitto.key
require_certificate true
use_identity_as_username true
acl_file /mosquitto/config/acl.conf

# --- 9001: WSS (browser/JS clients) ---
listener 9001
protocol websockets
cafile   /mosquitto/ca/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile  /mosquitto/certs/mosquitto.key

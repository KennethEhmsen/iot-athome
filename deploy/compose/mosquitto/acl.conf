# Mosquitto ACL — dev only.
#
# Mosquitto 2.0 denies all pub/sub for authenticated users unless an ACL
# grants them. This dev ACL is intentionally permissive: authenticated
# clients (by client cert CN) can read/write the full topic tree.
#
# Per-plugin ACLs generated from the plugin manifest land with the plugin
# installer in M2; at that point this file becomes unused.

# Match anything — all authenticated users.
pattern readwrite #

# Mosquitto ACL — dev only.
#
# This file is now **generated** by `iotctl mosquitto regen-acl` from
# the union of every installed plugin's `mqtt.{subscribe,publish}`
# capabilities (M5a W3 — debt #8). The plain-`pattern readwrite #`
# placeholder this used to carry granted authenticated clients the
# entire topic tree; manifest-driven generation replaces that with
# precise per-plugin allow-listing.
#
# Workflow:
#
#   iotctl mosquitto regen-acl \
#     --user iot-plugin-host \
#     --plugin-dir /var/lib/iotathome/plugins \
#     --out deploy/compose/mosquitto/acl.conf
#   docker compose -f deploy/compose/dev-stack.yml exec mosquitto kill -HUP 1
#
# Until the host actually runs (zero installed plugins), the generator
# emits a fail-closed file (no `topic` rules → Mosquitto 2.0 denies
# everything). The permissive fallback below kept the dev loop usable
# during M1-M5a; remove it once the host's first install populates
# the file via the generator.
pattern readwrite #

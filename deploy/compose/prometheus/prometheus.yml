global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: iot-nats
    metrics_path: /varz
    static_configs: [{ targets: ["nats:8222"] }]

  - job_name: iot-envoy
    metrics_path: /stats/prometheus
    static_configs: [{ targets: ["envoy:19000"] }]

  - job_name: prometheus
    static_configs: [{ targets: ["localhost:9090"] }]

  # Registry, gateway, automation, etc. are scraped when they exist
  # (Rust services expose /metrics on their OTel HTTP port).
  - job_name: iot-services
    static_configs: []

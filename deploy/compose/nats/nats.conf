# NATS — dev config.
# Per ADR-0004: mTLS between every client (plugin, service) and the server.
# Per-plugin user JWTs minted by `iotctl plugin install` against the
# operator-signed account JWT in `resolver.conf` (M5a W1 — retires
# ADR-0011). Generated artefacts live in
# `tools/devcerts/generated/nats/` and are mounted at `/etc/nats/certs/`.

port: 4222
http_port: 8222

server_name: iot-nats-dev

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

tls {
  cert_file: "/etc/nats/certs/nats.crt"
  key_file:  "/etc/nats/certs/nats.key"
  ca_file:   "/etc/nats/ca/ca.crt"
  verify:    true
  timeout:   3
}

# --- Decentralized auth (M5a W1) ---
#
# `resolver.conf` is generated by `iotctl nats bootstrap` (called from
# `tools/devcerts/mint.sh`) and contains:
#
#   operator: O...                   # the operator pubkey
#   resolver: MEMORY                 # in-memory account JWT resolver
#   resolver_preload: { A...: "..." } # operator-signed account JWT inline
#
# Keeping these lines in a generated include avoids hard-coding nkey
# values in this version-controlled file. The include path lives in
# the same mounted dir as the mTLS certs.
include "certs/resolver.conf"

# Logging
debug:   false
trace:   false
logtime: true

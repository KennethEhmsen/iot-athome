# NATS — dev config.
# Per ADR-0004: mTLS between every client (plugin, service) and the server.
# Per-plugin accounts are materialized by the registry on install;
# this config seeds the system account used during bootstrap.

port: 4222
http_port: 8222

server_name: iot-nats-dev

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

tls {
  cert_file: "/etc/nats/certs/nats.crt"
  key_file:  "/etc/nats/certs/nats.key"
  ca_file:   "/etc/nats/ca/ca.crt"
  verify:    true
  timeout:   3
}

# --- Accounts ---
# In production, one account per plugin, generated by the registry.
# For dev we ship a single shared account plus a system account.

accounts {
  SYS {
    users: [
      { user: "sys", password: "sys" }   # DEV ONLY
    ]
  }
  IOT {
    jetstream: enabled
    users: [
      { user: "dev", password: "dev" }   # DEV ONLY
    ]
  }
}
system_account: SYS

# Logging
debug:   false
trace:   false
logtime: true
